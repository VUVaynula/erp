<p class="MsoNormal" style="TEXT-ALIGN: justify; MARGIN: 6pt 0cm 0pt"><span style="FONT-SIZE: 11pt"><font face="Times New Roman">Документ «Назначение соответствий аналитик» предназначен для установки универсальных соответствий в регистре «Соответствия аналитик». Установленные соответствия используются в механизме трансляции данных для получения факта по управленческому учету.</font><o:p></o:p></span></p></body></html>
