<p class="MsoNormal" style="MARGIN: 0cm 0cm 0pt; mso-outline-level: 1"><b style="mso-bidi-font-weight: normal">Справочник «Группы структурных подразделений»<o:p></o:p></b></p>
<p class="MsoNormal" style="TEXT-ALIGN: justify; MARGIN: 0cm 0cm 0pt"><o:p> </o:p></p>
<p class="MsoNormal" style="TEXT-ALIGN: justify; MARGIN: 0cm 0cm 0pt">Справочник <b>«Группы структурных подразделений»</b> является вспомогательным для группировки структурных подразделений (Организации, ЦФО). </p>
<p class="MsoNormal" style="TEXT-ALIGN: justify; MARGIN: 0cm 0cm 0pt"><o:p> </o:p></p>
<p class="MsoNormal" style="TEXT-ALIGN: justify; MARGIN: 0cm 0cm 0pt">Используется в документе «Назначение правил трансляции» и регистре сведений «Назначение виз объектам системы».</p>
