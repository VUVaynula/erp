<p><span style="FONT-SIZE: 9pt; FONT-FAMILY: Times New Roman; FONT-WEIGHT: bold">Обработка «БИТ Результат проведения»</span></p>
<p><br></p>
<p><span style="FONT-SIZE: 9pt; FONT-FAMILY: Times New Roman">Эта служебная обработка позволяет отображать редактирование документов. Вызывается по кнопке</span><span style="FONT-SIZE: 9pt; FONT-FAMILY: Times New Roman; COLOR: red"> </span><span style="FONT-SIZE: 9pt; FONT-FAMILY: Times New Roman; COLOR: #0070c0">Дт</span><span style="FONT-SIZE: 9pt; FONT-FAMILY: Times New Roman; COLOR: red">Кт</span><span style="FONT-SIZE: 9pt; FONT-FAMILY: Times New Roman; COLOR: red"> </span><span style="FONT-SIZE: 9pt; FONT-FAMILY: Times New Roman">из списка документов. </span></p>
<p><span style="FONT-SIZE: 9pt; FONT-FAMILY: Times New Roman">Независимого открытия данной обработки нет.</span></p>
<p><span style="FONT-SIZE: 11pt; FONT-FAMILY: Times New Roman"></span> </p></body></html>
