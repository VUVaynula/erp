<p style="TEXT-ALIGN: justify"><span style="FONT-SIZE: 11pt; FONT-FAMILY: Times New Roman; FONT-WEIGHT: bold">Обработка «Записей регистрации оповещений»</span></p>
<p style="TEXT-ALIGN: justify"><br></p>
<p style="TEXT-ALIGN: justify"><span style="FONT-SIZE: 11pt; FONT-FAMILY: Times New Roman">Данная обработка</span><span style="FONT-SIZE: 11pt; FONT-FAMILY: Times New Roman">  </span><span style="FONT-SIZE: 11pt; FONT-FAMILY: Times New Roman">«Записей регистрации оповещений» служит для создания оповещений</span><span style="FONT-SIZE: 11pt; FONT-FAMILY: Times New Roman">  </span><span style="FONT-SIZE: 11pt; FONT-FAMILY: Times New Roman">и для удаления обработанных записей, в</span><span style="FONT-SIZE: 11pt; FONT-FAMILY: Times New Roman">  </span><span style="FONT-SIZE: 11pt; FONT-FAMILY: Times New Roman">отборе</span><span style="FONT-SIZE: 11pt; FONT-FAMILY: Times New Roman">  </span><span style="FONT-SIZE: 11pt; FONT-FAMILY: Times New Roman">проставляются нужные параметры и значения, для совершения действия нажать на кнопку «Выполнить действие». </span></p></body></html>
