<p class="MsoNormal" style="MARGIN: 0cm 0cm 0pt; mso-outline-level: 1"><strong>Обработка «Настройка прав доступа на уровне базы» <o:p></o:p></strong></p>
<p class="MsoNormal" style="TEXT-ALIGN: justify; MARGIN: 0cm 0cm 0pt"><o:p> </o:p></p>
<p class="MsoNormal" style="TEXT-ALIGN: justify; MARGIN: 0cm 0cm 0pt">Обработка <strong>«Настройка прав доступа на уровне базы»</strong> позволяет настраивать доступ к объектам конфигурации в пользовательском режиме. Ограничения на доступ вступают в силу при установленной константе <strong>«Использовать разделение доступа на уровне базы</strong>».</p>
